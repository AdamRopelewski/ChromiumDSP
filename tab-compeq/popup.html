<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tab Tone</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="top-bar">
        <button id="brand-button" class="brand-button" type="button" aria-label="Start capture">
          <img src="assets/icon.svg" alt="" />
        </button>
        <div class="brand-copy">
          <h1>Tab Tone</h1>
          <p class="host">Host <span id="hostname">-</span></p>
        </div>
        <div class="transport">
          <span id="status" class="status-pill">inactive</span>
          <button id="start" type="button">Start</button>
          <button id="stop" type="button">Stop</button>
          <button id="reset" class="ghost" type="button" hidden>Reset</button>
        </div>
      </header>

      <section class="preset-bar" aria-label="Presets">
        <label>
          Preset
          <select id="preset-select">
            <option value="">No preset</option>
          </select>
        </label>
        <button id="preset-save" type="button">Save</button>
        <button id="preset-delete" class="ghost" type="button">Delete</button>
      </section>

      <nav class="stage-tabs" aria-label="DSP chain">
        <span class="stage-static">Input</span>
        <span class="chain-arrow">→</span>
        <button id="chain-eq-stage" class="stage-tab stage-on active" type="button" data-stage="eq">
          EQ ON
        </button>
        <span class="chain-arrow">→</span>
        <button id="chain-comp-stage" class="stage-tab stage-off" type="button" data-stage="comp">
          Comp OFF
        </button>
        <span class="chain-arrow">→</span>
        <button class="stage-tab stage-on" type="button" data-stage="limiter">
          Limiter ON
        </button>
        <span class="chain-arrow">→</span>
        <span class="stage-static">Output</span>
      </nav>

      <section class="workbench">
        <section class="eq-column">
          <section class="analyzer-card" aria-label="EQ analyzer">
            <div class="analyzer-grid">
              <canvas id="eq-canvas" width="560" height="260"></canvas>
              <canvas
                id="compressor-canvas"
                width="560"
                height="260"
                hidden
              ></canvas>
              <div class="eq-toolbar">
                <button id="eq-undo" class="ghost mini" type="button">
                  Undo
                </button>
                <button id="eq-redo" class="ghost mini" type="button">
                  Redo
                </button>
                <button id="module-reset" class="ghost mini" type="button">
                  Reset EQ
                </button>
              </div>
              <span class="freq f20">20</span>
              <span class="freq f100">100</span>
              <span class="freq f1k">1k</span>
              <span class="freq f10k">10k</span>
            </div>
          </section>

          <fieldset class="stage-panel active" data-panel="eq">
            <legend>EQ Stage</legend>
            <label class="toggle-row">
              <input id="eq-enabled" type="checkbox" checked /> Enabled
            </label>
            <label>
              Input Gain: <span id="gain-value">0.0</span>dB
              <input
                id="gain"
                type="range"
                min="-60"
                max="6"
                step="0.1"
                value="0"
              />
            </label>
            <label>
              Width: <span id="width-value">1.00</span>x
              <input
                id="width"
                type="range"
                min="0"
                max="2"
                step="0.01"
                value="1"
              />
            </label>
          </fieldset>

          <fieldset class="stage-panel" data-panel="comp">
            <legend>Compressor Stage</legend>
            <label class="toggle-row">
              <input id="compressor-enabled" type="checkbox" /> Enabled
            </label>
            <label>
              Mode
              <select id="compressor-mode">
                <option value="stereo">Stereo</option>
                <option value="mid">Mid</option>
                <option value="side">Side</option>
              </select>
            </label>
            <label>
              Threshold: <span id="compressor-threshold-value">-24</span>dB
              <input
                id="compressor-threshold"
                type="range"
                min="-60"
                max="0"
                step="1"
                value="-24"
              />
            </label>
            <label>
              Knee: <span id="compressor-knee-value">6</span>dB
              <input
                id="compressor-knee"
                type="range"
                min="0"
                max="40"
                step="1"
                value="6"
              />
            </label>
            <label>
              Ratio: <span id="compressor-ratio-value">4.0</span>:1
              <input
                id="compressor-ratio"
                type="range"
                min="1"
                max="20"
                step="0.1"
                value="4"
              />
            </label>
            <label>
              Attack: <span id="compressor-attack-value">10</span>ms
              <input
                id="compressor-attack"
                type="range"
                min="0"
                max="1"
                step="0.001"
                value="0"
              />
            </label>
            <label>
              Release: <span id="compressor-release-value">250</span>ms
              <input
                id="compressor-release"
                type="range"
                min="0"
                max="1"
                step="0.001"
                value="0.823"
              />
            </label>
            <label>
              Wet Mix: <span id="compressor-wet-mix-value">100</span>%
              <input
                id="compressor-wet-mix"
                type="range"
                min="0"
                max="100"
                step="1"
                value="100"
              />
            </label>
          </fieldset>
        </section>

        <aside class="side-panel">
          <section class="band-panel meter-panel" aria-label="Global meters">
            <label>
              Input peak: <span id="global-input-meter-value">-inf</span>dB
              <span class="meter-track"><span id="global-input-meter" class="meter-fill"></span></span>
            </label>
            <label>
              Output peak: <span id="global-output-meter-value">-inf</span>dB
              <span class="meter-track"><span id="global-output-meter" class="meter-fill"></span></span>
            </label>
            <label>
              Total GR: <span id="global-gr-meter-value">0.0</span>dB
              <span class="meter-track"><span id="global-gr-meter" class="meter-fill gr"></span></span>
            </label>
          </section>
          <section id="comp-gain-panel" class="band-panel" hidden>
            <label>
              Input: <span id="compressor-input-gain-value">0.0</span>dB
              <input
                id="compressor-input-gain"
                type="range"
                min="-24"
                max="24"
                step="0.1"
                value="0"
              />
            </label>
            <label>
              Output: <span id="compressor-output-gain-value">0.0</span>dB
              <input
                id="compressor-output-gain"
                type="range"
                min="-24"
                max="24"
                step="0.1"
                value="0"
              />
            </label>
          </section>
          <section
            id="band-panel"
            class="band-panel"
            aria-label="Selected EQ band"
          >
            <strong id="eq-band-name">Band 3</strong>
            <label>
              Type
              <select id="eq-type">
                <option value="peaking">Peaking</option>
                <option value="lowshelf">Low Shelf</option>
                <option value="highshelf">High Shelf</option>
              </select>
            </label>
            <label>
              Mode
              <select id="eq-mode">
                <option value="stereo">Stereo</option>
                <option value="mid">Mid</option>
                <option value="side">Side</option>
              </select>
            </label>
            <label>
              Freq: <span id="eq-freq-value">1000</span>Hz
              <input
                id="eq-freq"
                type="range"
                min="0"
                max="1"
                step="0.001"
                value="0.566"
              />
            </label>
            <label>
              Gain: <span id="eq-gain-value">0.0</span>dB
              <input
                id="eq-gain"
                type="range"
                min="-12"
                max="12"
                step="0.1"
                value="0"
              />
            </label>
            <label>
              Q: <span id="eq-q-value">0.70</span>
              <input
                id="eq-q"
                type="range"
                min="0"
                max="1"
                step="0.001"
                value="0.295"
              />
            </label>
            <label class="toggle-row">
              <input id="eq-solo" type="checkbox" /> Solo
            </label>
          </section>
        </aside>
      </section>

      <p id="error" class="error" role="alert"></p>
      <section class="controls-grid">
        <fieldset class="stage-panel" data-panel="limiter">
          <legend>Limiter Stage</legend>
          <label>
            Input: <span id="limiter-input-gain-value">0.0</span>dB
            <input
              id="limiter-input-gain"
              type="range"
              min="-24"
              max="24"
              step="0.1"
              value="0"
            />
          </label>
          <label>
            Threshold: <span id="limiter-threshold-value">-1</span>dB
            <input
              id="limiter-threshold"
              type="range"
              min="-24"
              max="0"
              step="0.1"
              value="-1"
            />
          </label>
        </fieldset>
      </section>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
